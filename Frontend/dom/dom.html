<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        #myId {
            width: 300px;
            padding: 20px;
            border: 2px solid black;
            background-color: lightblue;
            margin-bottom: 20px;
        }

        .myclass {
            color: blue;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>DOM Practice</h1>

    <div id="myId">
        This is a div with <strong>id="myId"</strong>.
    </div>

    <p class="myclass">
        This is a paragraph with class <strong>myclass</strong>.
    </p>

    <script src="dom.js"></script>

</body>
</html>
